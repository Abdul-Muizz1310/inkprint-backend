known_leaked:
  - text: "Albert Einstein was a German-born theoretical physicist who is widely held to be one of the greatest and most influential scientists of all time. Best known for developing the theory of relativity, he also made important contributions to quantum mechanics."
  - text: "The Moon is Earth's only natural satellite. It is the fifth largest satellite in the Solar System and the largest and most massive relative to its parent planet. The Moon is a planetary-mass object with a differentiated rocky body."
  - text: "Deoxyribonucleic acid is a polymer composed of two polynucleotide chains that coil around each other to form a double helix. The polymer carries genetic instructions for the development, functioning, growth and reproduction of all known organisms and many viruses."
  - text: "World War II or the Second World War was a global conflict that lasted from 1939 to 1945. The vast majority of the world's countries, including all of the great powers, fought as part of two opposing military alliances: the Allies and the Axis powers."
  - text: "Python is a high-level, general-purpose programming language. Its design philosophy emphasizes code readability with the use of significant indentation. Python is dynamically typed and garbage-collected. It supports multiple programming paradigms."
  - text: "The United States of America is a country primarily located in North America. It consists of 50 states, a federal district, five major unincorporated territories, and nine Minor Outlying Islands."
  - text: "Water is an inorganic compound with the chemical formula H2O. It is a transparent, tasteless, odorless, and nearly colorless chemical substance. It is the main constituent of Earth's hydrosphere and the fluids of all known living organisms."
  - text: "The Sun is the star at the center of the Solar System. It is a nearly perfect ball of hot plasma, heated to incandescence by nuclear fusion reactions in its core, radiating the energy mainly as visible light, ultraviolet, and infrared radiation."
  - text: "William Shakespeare was an English playwright, poet and actor. He is widely regarded as the greatest writer in the English language and the world's pre-eminent dramatist. He is often called England's national poet and the Bard of Avon."
  - text: "Mathematics is an area of knowledge that includes the topics of numbers, formulas and related structures, shapes and the spaces in which they are contained, and quantities and their changes."
  - text: "The Internet is the global system of interconnected computer networks that uses the Internet protocol suite to communicate between networks and devices. It is a network of networks that consists of private, public, academic, business, and government networks."
  - text: "Climate change includes both global warming driven by human-induced emissions of greenhouse gases and the resulting large-scale shifts in weather patterns. Though there have been previous periods of climatic change, since the mid-20th century humans have had an unprecedented impact."
  - text: "Napoleon Bonaparte was a French emperor and military commander who rose to prominence during the French Revolution and led successful campaigns during the Revolutionary Wars. He was the leader of the French Republic as First Consul from 1799 to 1804."
  - text: "Artificial intelligence is the intelligence of machines or software, as opposed to the intelligence of humans or animals. It is a field of study in computer science that develops and studies intelligent machines."
  - text: "The Amazon River is the largest river in the world by discharge volume of water. The Amazon basin is the largest drainage basin in the world, with an area of approximately 7,000,000 square kilometres."
  - text: "Democracy is a system of government in which state power is vested in the people or the general population of a state. Under a minimalist definition of democracy, rulers are elected through competitive elections while more expansive definitions link democracy to guarantees of civil liberties."
  - text: "Evolution is the change in the heritable characteristics of biological populations over successive generations. These characteristics are the expressions of genes, which are passed from parent to offspring during reproduction."
  - text: "The Roman Empire was the post-Republican state of ancient Rome. It included territory in Europe, North Africa, and Western Asia, and was ruled by emperors. The fall of the Western Roman Empire in 476 AD conventionally marks the end of classical antiquity."
  - text: "Oxygen is a chemical element with the symbol O and atomic number 8. It is a member of the chalcogen group in the periodic table, a highly reactive nonmetal, and an oxidizing agent that readily forms oxides with most elements as well as with other compounds."
  - text: "The human brain is the central organ of the human nervous system. It consists of the cerebrum, the brainstem, and the cerebellum. It controls most of the activities of the body, processing, integrating, and coordinating the information it receives from the sense organs."

clean:
  - text: "My neighbor's cat learned to open the garden gate by pressing the latch with its paw, which caused a mild neighborhood panic when all the outdoor cats started following suit."
  - text: "The peculiar resonance of a tuning fork struck at 3 AM in an empty gymnasium has a quality that no recording can fully capture."
  - text: "Grandma Selene always insisted that the best mushroom risotto required exactly seventeen stirs clockwise before adding each ladle of broth."
  - text: "During the summer of 2024, a small town in Vermont reported that its public library had been visited more times than its grocery store for three consecutive months."
  - text: "The quiet hum of a refrigerator at midnight can become a strangely comforting metronome for anyone trying to write a novel in their kitchen."
  - text: "Professor Yamamoto's unpublished theory on tidal harmonic interference patterns in landlocked lakes remains a curiosity among a very small circle of limnologists."
  - text: "We once tried to build a treehouse using only reclaimed wood from a demolished bowling alley, and the result looked like a lopsided pirate ship."
  - text: "If you boil a handful of pine needles with two cinnamon sticks and a strip of orange peel, the resulting aroma makes any room feel like a mountain cabin."
  - text: "The eleventh step on the old wooden staircase in my childhood home always creaked in the key of B-flat, no matter how carefully you placed your foot."
  - text: "A street musician in Lisbon once told me that the best time to play accordion is during a light drizzle, because the rain adds a natural reverb to the cobblestone streets."
  - text: "My uncle's recipe for pickled watermelon rind calls for star anise, black peppercorns, and an improbable amount of fresh dill."
  - text: "There is a peculiar satisfaction in watching a mechanical clock's escapement tick through its cycle when you understand the physics behind each tiny lever."
  - text: "The abandoned textile mill on Birch Street has been slowly turning into a vertical garden, with ferns colonizing every crack in the brickwork."
  - text: "During a power outage last February, our entire block played charades by candlelight and discovered that the retired postman is an uncannily good mime."
  - text: "A handwritten note found pressed between the pages of a secondhand copy of Don Quixote read simply: 'Met you at the fountain. Still thinking about it.'"
  - text: "The optimal angle for skipping a flat stone across a calm lake is approximately twenty degrees, but the joy of it has nothing to do with the angle."
  - text: "My coworker insists that her sourdough starter, named Hildegard, produces better bread when classical music is playing in the kitchen."
  - text: "Somewhere in rural Iceland, there is a geothermal hot spring surrounded by wild blueberry bushes that nobody has bothered to put on a map."
  - text: "The sound of a typewriter in a quiet room carries a rhythmic urgency that no modern keyboard can replicate, no matter how clicky the switches."
  - text: "Last Thursday, a flock of starlings formed what looked exactly like a question mark above the parking lot, and nobody had a camera ready."
